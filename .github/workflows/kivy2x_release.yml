name: Build and Publish kivy2x Wheels

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13.8'

      - name: force version to 2.3.1
        run: sed -i '' 's/^version = .*/version = "2.3.1"/' pyproject.toml

      - name: install cibuildwheel
        run: pip install cibuildwheel

      - name: setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c

      - name: build wheels
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/wheels
          cd build
          bash ../kivy_scripts/kivy2x_build_android_wheels.sh

      - run: ls build/wheels

      - uses: actions/upload-artifact@v4
        with:
          name: kivy2x-android-wheels
          path: build/wheels/

  build-ios:
    name: Build iOS
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13.8'

      - name: force version to 2.3.1
        run: sed -i '' 's/^version = .*/version = "2.3.1"/' pyproject.toml

      - name: install cibuildwheel
        run: pip install cibuildwheel

      - name: build wheels
        run: |
          mkdir -p build/wheels
          cd build
          bash ../kivy_scripts/kivy2x_build_ios_wheels.sh

      - run: ls build/wheels

      - uses: actions/upload-artifact@v4
        with:
          name: kivy2x-ios-wheels
          path: build/wheels/

  build-macos:
    name: Build macOS
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13.8'

      - name: force version to 2.3.1
        run: sed -i '' 's/^version = .*/version = "2.3.1"/' pyproject.toml

      - name: install cibuildwheel
        run: pip install cibuildwheel

      - name: build wheels
        run: |
          mkdir -p build/wheels
          cd build
          bash ../kivy_scripts/kivy2x_build_macos_wheels.sh

      - run: ls build/wheels

      - uses: actions/upload-artifact@v4
        with:
          name: kivy2x-macos-wheels
          path: build/wheels/

  publish-r2:
    name: Publish to R2
    needs: [build-android, build-ios, build-macos]
    runs-on: ubuntu-latest
    if: false  # TODO: remove this line when ready to enable publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: kivy2x-*-wheels
          merge-multiple: true
          path: wheels/

      - name: configure aws cli for r2
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set region auto

      - name: upload wheels to r2
        run: |
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          for FILE in wheels/*.whl; do
            BASENAME=$(basename "$FILE")
            echo "Uploading $BASENAME"
            aws s3 cp "$FILE" "s3://pypi-packages/packages/$BASENAME" \
              --endpoint-url "$ENDPOINT"
          done
